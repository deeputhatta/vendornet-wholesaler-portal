<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- App icon square -->
  <rect width="400" height="400" rx="80" fill="#185FA5"/>

  <!-- Cross connection lines (subtle) -->
  <line x1="87" y1="147" x2="220" y2="147" stroke="white" stroke-width="1.5" opacity="0.12"/>
  <line x1="200" y1="69" x2="253" y2="310" stroke="white" stroke-width="1.5" opacity="0.12"/>
  <line x1="67" y1="240" x2="313" y2="227" stroke="white" stroke-width="1.5" opacity="0.12"/>

  <!-- Lines from satellites to center -->
  <line x1="87" y1="147" x2="200" y2="200" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="200" y1="69" x2="200" y2="200" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="313" y1="147" x2="200" y2="200" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="340" y1="227" x2="200" y2="200" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="253" y1="330" x2="200" y2="200" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="147" y1="333" x2="200" y2="200" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="60" y1="240" x2="200" y2="200" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Satellite nodes — green and yellow alternating -->
  <circle cx="87" cy="147" r="20" fill="#1D9E75"/>
  <circle cx="200" cy="69" r="16" fill="#F2C94C"/>
  <circle cx="313" cy="147" r="20" fill="#1D9E75"/>
  <circle cx="340" cy="227" r="16" fill="#F2C94C"/>
  <circle cx="253" cy="330" r="18" fill="#1D9E75"/>
  <circle cx="147" cy="333" r="16" fill="#F2C94C"/>
  <circle cx="60" cy="240" r="18" fill="#1D9E75"/>

  <!-- Center node — layered rings -->
  <circle cx="200" cy="200" r="62" fill="white" opacity="0.12"/>
  <circle cx="200" cy="200" r="44" fill="white" opacity="0.2"/>
  <circle cx="200" cy="200" r="28" fill="white"/>
  <circle cx="200" cy="200" r="14" fill="#185FA5"/>
</svg>
